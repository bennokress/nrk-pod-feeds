name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: '23 21 * * 5' # Fridays 21:23 UTC

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.10
        with:
          configurationFile: renovate-self-hosted.json
          token: ${{ secrets.RENOVATE_TOKEN }}
