name: update-video-podcast-feeds

on:
  workflow_dispatch:
  schedule:
   - cron: '25 * * * *'  # Run hourly at :25 (5 min after sync)

jobs:
  update-video-feeds:
    runs-on: ubuntu-24.04
    steps:

      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.FEED_PUSH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14.6'
          cache: 'pip'

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create directories
        run: |
          mkdir -p docs/rss/video
          mkdir -p docs/chapters

      - name: Ensure ffmpeg is available
        run: |
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y ffmpeg
          fi
          ffmpeg -version | head -n 1

      - name: Execute video feed generation script
        run: python generate_video_feeds.py
        env:
          BUNNY_STORAGE_ZONE_NAME: ${{ secrets.BUNNY_STORAGE_ZONE_NAME }}
          BUNNY_STORAGE_ACCESS_KEY: ${{ secrets.BUNNY_STORAGE_ACCESS_KEY }}
          PERSONAL_FEED_CDN_BASE: ${{ secrets.PERSONAL_FEED_CDN_BASE }}
          PERSONAL_FEED_PATH_PREFIX: ${{ secrets.PERSONAL_FEED_PATH_PREFIX }}
          PERSONAL_FEED_SOURCE_SERIES: ${{ secrets.PERSONAL_FEED_SOURCE_SERIES }}
          PERSONAL_FEED_SUBSCRIPTION_SLUG: ${{ secrets.PERSONAL_FEED_SUBSCRIPTION_SLUG }}

      - name: Stamp build timestamp into index.html (only when feeds changed)
        run: |
          if ! git diff --quiet docs/rss/video/ docs/chapters/; then
            python update_index.py
          else
            echo "No feed changes; skipping index timestamp update."
          fi

      - name: Detect docs changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain docs/)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No docs changes; nothing to publish."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit on feed branch and merge into main
        if: steps.changes.outputs.changed == 'true'
        env:
          BRANCH: feed/auto-${{ github.run_id }}
        run: |
          set -euo pipefail
          git config user.name "Feed Updater"
          git config user.email "actions@github.com"
          git checkout -b "$BRANCH"
          git add docs
          git commit -m "chore(auto): Update video podcast feed(s)"

          attempt=0
          max_attempts=3
          while true; do
            attempt=$((attempt + 1))
            git fetch origin main

            if ! git rebase origin/main "$BRANCH"; then
              echo "::error::Rebase of $BRANCH onto origin/main conflicted; aborting."
              git rebase --abort || true
              exit 1
            fi

            git checkout -B main origin/main
            git merge --no-ff "$BRANCH" -m "chore(auto): Update video podcast feed(s)"

            if git push origin main; then
              echo "Pushed merge commit to main on attempt $attempt."
              break
            fi

            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::Push to main failed after $max_attempts attempts."
              exit 1
            fi
            echo "Push rejected (likely concurrent update); retrying."
          done
